<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Kishan Mitar Login</title>
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: url('https://images.unsplash.com/photo-1608889175740-fc5c04f94357?ixlib=rb-4.0.3&auto=format&fit=crop&w=1280&q=80') no-repeat center center fixed;
      background-size: cover;
      min-height: 100vh;
      position: relative;
    }
    .overlay {
      background-color: rgba(0, 38, 9, 0.6);
      position: fixed;
      top: 0;
      left: 0;
      height: 100vh;
      width: 100vw;
      z-index: 0;
    }
    .container {
      position: relative;
      z-index: 1;
      max-width: 400px;
      margin: 100px auto;
      background: rgba(255, 255, 255, 0.98);
      border-radius: 18px;
      padding: 38px 28px 28px 28px;
      box-shadow: 0 12px 32px rgba(44,109,44,0.18), 0 2px 4px 2px rgba(0,0,0,0.16);
      backdrop-filter: blur(2px);
      animation: fadein 1.2s;
    }
    @keyframes fadein {
      from { opacity: 0; transform: translateY(-40px);}
      to   { opacity: 1; transform: translateY(0);}
    }
    .container h2 {
      text-align: center;
      margin-bottom: 30px;
      color: #2e7d32;
      font-size: 2rem;
      letter-spacing: 1px;
    }
    form label {
      font-weight: 500;
      display: block;
      margin-bottom: 6px;
      color: #2e7d32;
      font-size: 1rem;
      letter-spacing: 0.2px;
    }
    form input[type="text"],
    form input[type="tel"],
    form input[type="password"] {
      width: 100%;
      padding: 12px 12px;
      margin-bottom: 22px;
      border: 1.5px solid #e3e3e3;
      border-radius: 7px;
      background: #fafafa;
      font-size: 15px;
      transition: border .2s;
      outline: none;
    }
    form input[type="text"]:focus,
    form input[type="tel"]:focus,
    form input[type="password"]:focus {
      border: 1.5px solid #43ae4a;
      background: #fff;
    }
    input[type="submit"] {
      width: 100%;
      padding: 14px;
      background: linear-gradient(90deg, #4caf50 60%, #337a39 100%);
      color: white;
      font-size: 17px;
      font-weight: 700;
      border: none;
      border-radius: 7px;
      cursor: pointer;
      margin-top: 2px;
      transition: background .25s, box-shadow .25s;
      box-shadow: 0 3px 9px rgba(44,109,44,0.10);
    }
    input[type="submit"]:hover {
      background: linear-gradient(90deg, #388e3c 70%, #1d5422 100%);
      box-shadow: 0 5px 18px rgba(44,109,44,0.22);
    }
    .footer {
      text-align: center;
      margin-top: 24px;
      font-size: 14px;
      color: #444;
    }
    .footer a {
      color: #388e3c;
      font-weight: 600;
      text-decoration: none;
      transition: color .2s;
    }
    .footer a:hover {
      color: #48ad3a;
    }
    @media (max-width: 500px) {
      .container {
        margin: 55px 6px;
        padding: 27px 7vw 22px 7vw;
      }
      .container h2 {
        font-size: 1.5rem;
      }
    }
    /* Accessibility: Ensure contrast and spacing on very small screens */
    @media (max-width: 370px) {
      .container {
        padding: 12px 2vw 10px 2vw;
      }
    }
  </style>
</head>
<body>
  <div class="overlay" aria-hidden="true"></div>
  <div class="container">
    <h2>🌾 Kishan Mitar Login</h2>
    <form action="#" method="post" autocomplete="off">
      <label for="name">👤 Name</label>
      <input type="text" id="name" name="name" placeholder="Enter your name" required aria-label="Name">

      <label for="phone">📱 Phone Number</label>
      <input type="tel" id="phone" name="phone" placeholder="Enter phone number" pattern="[0-9]{10}" required aria-label="Phone number" maxlength="10">

      <label for="password">🔐 Password</label>
      <input type="password" id="password" name="password" placeholder="Enter password" required aria-label="Password">

      <input type="submit" value="Login" />
    </form>
    <div class="footer">
      Don't have an account?
      <a href="#">Register</a>
    </div>
  </div>
</body>
</html>
